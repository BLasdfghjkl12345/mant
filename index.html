<script>
const cards = document.querySelectorAll('.item-card');
const playPage = document.getElementById('playPage');
const imgMedia = document.getElementById('imgMedia');
const vidMedia = document.getElementById('vidMedia');
const playTitle = document.getElementById('playTitle');
const playDesc = document.getElementById('playDesc');

// 点击卡片 自动识别图片/视频
cards.forEach(card => {
    card.onclick = function(){
        let type = this.dataset.type;
        let src = this.dataset.src;
        let title = this.dataset.title;
        let desc = this.dataset.desc;

        // 重置隐藏
        imgMedia.style.display = 'none';
        vidMedia.style.display = 'none';

        if(type === 'img'){
            imgMedia.src = src;
            imgMedia.style.display = 'block';
        }else if(type === 'video'){
            vidMedia.src = src;
            vidMedia.style.display = 'block';
        }
        playTitle.innerText = title;
        playDesc.innerText = desc;
        playPage.style.display = 'block';
    }
});

function closePlay(){
    playPage.style.display = 'none';
    vidMedia.pause();
}

function doSearch(){
    let key = document.getElementById('searchInput').value.trim();
    if(!key) return;
    alert('正在搜索：'+key);
}
function jumpWeiXin(){window.location.href="weixin://";}
function jumpDouYin(){window.location.href="douyin://";}
function jumpQQ(){window.location.href="mqq://";}

// 背景音乐自动播放处理
const bgMusic = document.getElementById('bgMusic');
bgMusic.volume = 0.5;
document.addEventListener('DOMContentLoaded',function(){
    bgMusic.play();
    document.body.addEventListener('click',()=>{
        bgMusic.muted = false;
        bgMusic.play();
    },{once:true});
});
</script>

// 你的音乐列表，把所有歌曲都放这里
const musicList = [
  { title: "歌曲1", src: "music1.mp3" },
  { title: "歌曲2", src: "music2.mp3" },
  { title: "歌曲3", src: "music3.mp3" },
  // 可以继续加更多歌曲
];

let currentIndex = 0;
const bgMusic = document.getElementById('bgMusic');
const musicTitle = document.getElementById('music-title');

// 加载当前歌曲
function loadMusic(index) {
  if (musicList.length === 0) return;
  const music = musicList[index];
  bgMusic.src = music.src;
  musicTitle.innerText = `当前歌曲：${music.title}`;
}

// 上一首
function prevMusic() {
  currentIndex = (currentIndex - 1 + musicList.length) % musicList.length;
  loadMusic(currentIndex);
  bgMusic.play();
}

// 下一首
function nextMusic() {
  currentIndex = (currentIndex + 1) % musicList.length;
  loadMusic(currentIndex);
  bgMusic.play();
}

// 暂停/播放
function toggleMusic() {
  if (bgMusic.paused) {
    bgMusic.play();
  } else {
    bgMusic.pause();
  }
}

// 页面加载时自动播放（兼容浏览器限制）
window.addEventListener('load', () => {
  if (musicList.length > 0) {
    loadMusic(0);
    bgMusic.play();
  }
});

// 用户第一次点击页面，解除静音并开始播放
document.addEventListener('click', () => {
  bgMusic.muted = false;
  bgMusic.play();
}, { once: true });
